<section class="mainContent">
<div class="container">

  <form action="/#"> <!--TODO add backend for email-->

    <label for="fname">First Name</label>
    <input matInput [formControl]="nameFormControl" type="text" id="fname" name="firstname" placeholder="Your name..">

    <label for="lname">Last Name</label>
    <input matInput [formControl]="lNameFormControl" type="text" id="lname" name="lastname" placeholder="Your last name..">

    <label for="email">Email</label>
    <input matInput [formControl]="emailFormControl" type="text" id="email" name="lastname" placeholder="Your Email..">


    <label for="subject">Subject</label>
    <textarea id="subject" name="subject" placeholder="Write The Message.." style="height:100px"></textarea>

    <input type="submit" value="Submit">
  </form>
</div>

<div>

</div>

</section>
